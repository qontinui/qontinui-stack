# qontinui-canonical-nats-3 — third cluster node. See nats-1.conf for
# the shared design notes. Differences are server_name + the routes
# list pointing at the other two peers.

server_name: nats-3
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 4GB
}

cluster {
  name: qontinui-canonical
  listen: 0.0.0.0:6222
  routes: [
    nats://qontinui-canonical-nats-1:6222
    nats://qontinui-canonical-nats-2:6222
  ]
  authorization {
    user: cluster
    password: $CLUSTER_PASSWORD
    timeout: 5
  }
}

authorization {
  user: $CLIENT_USER
  password: $CLIENT_PASSWORD
  timeout: 5
}
