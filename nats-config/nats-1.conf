# qontinui-canonical-nats-1 — first cluster node.
#
# Row 9 Phase 1 (failure-modes-at-scale design §3.1): a 3-node JetStream
# cluster fronts every durable event stream. Per the design, this Phase 1
# stands up the cluster with dual-publish from coord — Redis stays in
# service through the 2-week burn-in.
#
# Auth posture (Phase 1):
#   - Cluster routes: hardcoded shared password baked into the config
#     files. The cluster mesh is only reachable from the compose
#     network — not LAN-exposed — so the threat model matches the
#     pattern Redis already uses (LAN-internal trust).
#   - Client auth: env-var-driven user/password. Coord picks up
#     `NATS_URL=nats://qontinui_client:...@nats-1:4222` from the
#     compose env. Per-agent scoped JWTs replace this in Row 9 Phase 2
#     once coord's JWT issuer ships.
#   - mTLS: documented as the production target in
#     plans/2026-05-14-failure-modes-at-scale-design.md §3.1 and
#     deferred to Phase 2 hardening.
#
# Env-var pattern note: NATS's `$VAR` substitution only works on bare
# unquoted scalars (per NATS config docs). Quoting breaks substitution.
# The cluster route URL syntax requires `:` and `@`, which the config
# parser sees as structural separators if unquoted — so we keep the
# cluster credential literal here and bind only the client auth fields
# to env vars.

server_name: nats-1
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# JetStream — durable, replayable streams. The store_dir is a docker
# volume per node so streams survive container restarts.
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 256MB
  max_file_store: 4GB
}

# 3-node clustering. Each node lists the other two; NATS resolves the
# mesh from any pair. Outgoing route auth uses the URL's user:pass;
# incoming uses cluster.authorization. Both ends must match — that's
# why the literal `cluster_shared_dev` appears in both places.
cluster {
  name: qontinui-canonical
  listen: 0.0.0.0:6222
  routes: [
    nats-route://cluster:cluster_shared_dev@qontinui-canonical-nats-2:6222
    nats-route://cluster:cluster_shared_dev@qontinui-canonical-nats-3:6222
  ]
  authorization {
    user: cluster
    password: cluster_shared_dev
    timeout: 5
  }
}

# Client auth — coord and subscribers use these creds.
authorization {
  user: $CLIENT_USER
  password: $CLIENT_PASSWORD
  timeout: 5
}
