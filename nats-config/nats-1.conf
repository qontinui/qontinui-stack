# qontinui-canonical-nats-1 — first cluster node.
#
# Row 9 Phase 1 (failure-modes-at-scale design §3.1): a 3-node JetStream
# cluster fronts every durable event stream. Per the design, this Phase 1
# stands up the cluster with dual-publish from coord — Redis stays in
# service through the 2-week burn-in.
#
# Auth posture (Phase 1):
#   - Cluster routes use a shared `cluster_password` token.
#   - Client auth uses a single static user/pass pair for coord +
#     subscribers. Per-agent JWTs ship in Row 9 Phase 2 once the
#     coord-issued JWT issuer lands; the NATS account graph is wired
#     in then.
#   - mTLS is documented as the production posture in
#     `plans/2026-05-14-failure-modes-at-scale-design.md` §3.1 and
#     deferred to Phase 2 hardening (CA generation, cert distribution,
#     and client trust-store updates are a non-trivial chunk of work
#     that doesn't affect the dual-publish behavior under test here).
#
# Env-var note: NATS config substitutes `$VAR` from the server process
# env. The values come from the matching `environment:` keys in
# qontinui-stack/docker-compose.yml (which themselves default via
# `${NATS_*:-...}` interpolation at compose-time).

server_name: nats-1
listen: 0.0.0.0:4222
http: 0.0.0.0:8222

# JetStream — durable, replayable streams. The store_dir is a docker
# volume per node so streams survive container restarts.
jetstream {
  store_dir: /data/jetstream
  # Memory cap chosen to fit comfortably under the redis maxmemory
  # ceiling (1G); the on-disk store is the load-bearing surface.
  max_memory_store: 256MB
  max_file_store: 4GB
}

# 3-node clustering. Each node lists the other two as routes; NATS
# resolves the mesh from any pair.
cluster {
  name: qontinui-canonical
  listen: 0.0.0.0:6222
  # Routes carry credentials inline. NATS authenticates outgoing route
  # connections from the URL's user:pass and incoming ones from the
  # `authorization` block below. Identical password on both sides.
  routes: [
    "nats://cluster:$CLUSTER_PASSWORD@qontinui-canonical-nats-2:6222"
    "nats://cluster:$CLUSTER_PASSWORD@qontinui-canonical-nats-3:6222"
  ]
  # Cluster auth — shared token across the three nodes. Distinct from
  # client auth so a compromised client credential can't impersonate a
  # cluster peer.
  authorization {
    user: cluster
    password: "$CLUSTER_PASSWORD"
    timeout: 5
  }
}

# Client auth — coord and subscribers use these creds. Per-agent
# scoped JWTs (design §3.3) replace this in Row 9 Phase 2.
authorization {
  user: "$CLIENT_USER"
  password: "$CLIENT_PASSWORD"
  timeout: 5
}
