# qontinui-stack — canonical database stack for the canonical-DB topology.
#
# This is the authoritative dev/self-host/cloud-equivalent backplane. It runs
# Postgres 16 (with pgvector), Redis 7, and MinIO (S3-compatible blob), plus
# a one-shot alembic migrator that brings the schema to head on `up`.
#
# Topology plan: D:\qontinui-root\tmp_canonical_db_topology_plan.md (§9 Phase 1).
#
# Port choices: 5433 / 6380 / 9100-9101 — deliberately offset from the current
# qontinui-web stack (5432 / 6379 / 9000-9001) so both can run side-by-side
# during the cutover. After cutover completes (per topology plan §10), the
# qontinui-web stack is decommissioned and this stack can move to the
# standard ports if desired.
#
# Service summary:
#   postgres   — canonical PG; pgvector enabled; four schemas pre-created.
#   redis      — claims, pub/sub, presence; sub-second TTL primitives.
#   minio      — S3-compatible blob; dev-only; staging+prod use real S3.
#   migrator   — one-shot, runs `alembic upgrade head` on `up`, then exits.
#   nats-1..3  — JetStream cluster for durable, replayable events
#                (Row 9 Phase 1 — failure-modes-at-scale design §3.1).
#
# Connection strings for ~/.qontinui/profiles.json (dev profile):
#   postgres://qontinui_user:qontinui_dev_password@<host>:5433/qontinui_db
#   redis://<host>:6380/0
#   http://<host>:9100   (MinIO S3 API)
#   http://<host>:9101   (MinIO console)
#
# <host> is the PC's LAN IP (typically 192.168.x.x), exposed to MSI laptop
# and the third machine over LAN. Topology plan §9 Phase 2 covers exposure.

services:
  # ───────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 + pgvector — canonical durable state.
  # ───────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qontinui-canonical-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qontinui_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qontinui_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-qontinui_db}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - canonical_postgres_data:/var/lib/postgresql/data
      # Bootstrap scripts run only on first container start (when the data
      # volume is empty). Idempotent ON CONFLICT-style guards inside the
      # scripts make them safe to re-run if the volume is wiped.
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    # Same hardening the qontinui-web stack uses (qontinui-web/docker-compose.yml:22-27)
    # — bounded idle-in-transaction timeout + TCP keepalives so abandoned
    # backends from crashed dev runners get cleaned up promptly. Without
    # these, a single dev session can leak 10+ orphan backends before
    # container restart.
    command: >
      postgres
      -c idle_in_transaction_session_timeout=300000
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=6
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qontinui_user} -d ${POSTGRES_DB:-qontinui_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────
  # Redis 7 — claims, pub/sub, presence.
  # ───────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qontinui-canonical-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - canonical_redis_data:/data
    # appendonly = on for crash-resilient claim audit; the durable audit
    # lives in PG, but the live claim state in Redis surviving a container
    # restart matters during dev to avoid all-claims-expire on `down`/`up`.
    #
    # requirepass is set so LAN-reachable Redis isn't a wide-open shared
    # cache. Same auth posture lifts cleanly to AWS staging/prod (just
    # supply a different REDIS_PASSWORD).
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${REDIS_PASSWORD:-qontinui_dev_redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-qontinui_dev_redis}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────
  # MinIO — S3-compatible blob storage (dev only).
  # ───────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: qontinui-canonical-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - canonical_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bucket-creation sidecar — runs once after MinIO is healthy, then exits.
  #
  # Owns these buckets:
  #   qontinui-dev          — general dev blob store
  #   qontinui-bazel-remote — content-addressed cache backing for the
  #                           bazel-remote service below (Row 10 Item 4).
  #
  # Bucket creation is idempotent (`mb --ignore-existing`); the sidecar
  # is the gate that downstream services depend on for "bucket exists".
  # The sccache container creates its own `qontinui-sccache` bucket via
  # its entrypoint — that pattern stays in place; only buckets co-owned
  # with multi-service contracts live here.
  minio-init:
    image: minio/mc:latest
    container_name: qontinui-canonical-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        /usr/bin/mc alias set canonical http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} && \
        /usr/bin/mc mb canonical/qontinui-dev --ignore-existing && \
        /usr/bin/mc anonymous set download canonical/qontinui-dev && \
        /usr/bin/mc mb canonical/${BAZEL_REMOTE_BUCKET:-qontinui-bazel-remote} --ignore-existing && \
        echo "MinIO buckets qontinui-dev + ${BAZEL_REMOTE_BUCKET:-qontinui-bazel-remote} ready" && \
        exit 0
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────
  # Alembic migrator — one-shot `alembic upgrade head` on `up`.
  #
  # Built from ./migrator/Dockerfile against a build context one level up
  # (`..`), so it can COPY from sibling repos qontinui-web/backend/ (alembic
  # chain + model graph) and qontinui-schemas/ (pydantic-only path dep).
  # See ./migrator/Dockerfile for the full rationale, including why we
  # use a curated dep set instead of `poetry install --only main` against
  # qontinui-web/backend (the latter would drag torch + CUDA in via the
  # heavy `qontinui` path dep).
  #
  # Connect string uses the in-stack service name `postgres` and the
  # in-container port 5432, NOT the host-mapped 5433.
  # ───────────────────────────────────────────────────────────────────────
  migrator:
    build:
      context: ..
      dockerfile: qontinui-stack/migrator/Dockerfile
    image: qontinui-canonical-migrator:latest
    container_name: qontinui-canonical-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-qontinui_user}:${POSTGRES_PASSWORD:-qontinui_dev_password}@postgres:5432/${POSTGRES_DB:-qontinui_db}
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────
  # Alembic status sidecar — long-running observability surface.
  #
  # Runs the same image as the migrator but with a no-op command, so the
  # container stays alive for healthchecks. Its docker healthcheck
  # (/alembic_at_head.sh) compares `alembic current` (DB-stamped rev)
  # to `alembic heads` (chain head from the embedded alembic/versions/).
  # The check fails on: empty alembic_version, multi-head divergence
  # (the 2026-05-07 failure mode), or current != head (post-migration
  # silent-failure fallout).
  #
  # Why a sidecar instead of augmenting postgres's healthcheck:
  #   - postgres is the postgres image; it doesn't have alembic or the
  #     chain. Injecting them would fork the upstream image.
  #   - This decouples "is PG accepting connections?" (postgres health)
  #     from "is the schema at head?" (alembic-status health). External
  #     observers pick whichever signal matches their concern.
  #   - The migrator-success gate on coord (line 211) handles the
  #     in-stack startup ordering. This sidecar is purely for external
  #     visibility — `docker inspect`, supervisor probes, CI smoke
  #     scripts, future Prometheus exporters.
  #
  # depends_on migrator: service_completed_successfully — without this,
  # the sidecar would briefly report unhealthy (current != head) on a
  # cold start while the migrator is still running. Gating on migrator
  # completion makes "starting" → "healthy" the only legitimate
  # transition.
  # ───────────────────────────────────────────────────────────────────────
  alembic-status:
    image: qontinui-canonical-migrator:latest
    container_name: qontinui-canonical-alembic-status
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-qontinui_user}:${POSTGRES_PASSWORD:-qontinui_dev_password}@postgres:5432/${POSTGRES_DB:-qontinui_db}
    # `tini` is PID-1 so signals to the container terminate cleanly.
    # `sleep infinity` keeps the container alive without burning CPU.
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["sh", "-c", "exec sleep infinity"]
    healthcheck:
      test: ["CMD", "/alembic_at_head.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────
  # qontinui canonical sccache — LAN-shared rustc compile-unit cache.
  #
  # Row 2 Phase 2 of the fleet topology design
  # (plans/2026-05-14-fleet-topology-and-build-pool-design.md §3.3).
  # The shared cache itself lives in MinIO under bucket `qontinui-sccache`;
  # each agent / build machine runs a local sccache daemon configured to
  # talk S3 to that bucket. This container's role is:
  #
  #   1. Idempotently create the `qontinui-sccache` MinIO bucket at boot.
  #   2. Expose stats HTTP for the coord `/metrics` scraper (:4227).
  #   3. Pre-stage a dormant sccache server (:4226) for Phase 6
  #      cloud-burst CI workers that will compile inside containers.
  #
  # Port convention follows the rest of the stack: sccache default daemon
  # port 4226 stays internal-only (host-mapped for Phase 6); stats HTTP at
  # 4227 is host-exposed so coord on :9870 can scrape it over the LAN.
  # ───────────────────────────────────────────────────────────────────────
  sccache:
    build:
      context: ./sccache
      dockerfile: Dockerfile
    image: qontinui-canonical-sccache:latest
    container_name: qontinui-canonical-sccache
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SCCACHE_BUCKET: ${SCCACHE_BUCKET:-qontinui-sccache}
      SCCACHE_MINIO_HOST: ${SCCACHE_MINIO_HOST:-minio:9000}
      SCCACHE_MINIO_USER: ${MINIO_ROOT_USER:-minioadmin}
      SCCACHE_MINIO_PASS: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SCCACHE_STATS_PORT: "4227"
    ports:
      - "${SCCACHE_DAEMON_PORT:-4226}:4226"
      - "${SCCACHE_STATS_PORT:-4227}:4227"
    healthcheck:
      # Hit 127.0.0.1 explicitly: alpine's busybox wget tries IPv6 (::1)
      # first for `localhost`, but Python's stdlib HTTPServer binds
      # IPv4-only, so the healthcheck would otherwise fail with
      # "Connection refused" while the service is happily up.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:4227/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────
  # bazel-remote — content-addressed build cache (CAS) + ActionResult (AC).
  #
  # Row 10 Item 4 of the validation-freshness implementation tracker
  # (plans/2026-05-14-row-10-implementation-tracker.md). The supervisor
  # build pool will (in Items 5–7) extend its current timestamp-keyed
  # reuse to a content-hash key derived by `canonical_diff_hash.py`, then
  # query bazel-remote's AC at that key before dispatching a build. This
  # container is just the backing store; integration is Wave 4+.
  #
  # Topology:
  #   - HTTP API on host :9094 (container :80) — REST CAS + AC routes
  #     used by the spike + (eventually) supervisor pool. Default port 80
  #     is hardcoded in the upstream image entrypoint.
  #   - gRPC on host :9095 (container :9092) — REAPI gRPC for native
  #     Bazel-style clients; reserved for Item 7+ once supervisor writes
  #     real ActionResult protobufs.
  #   - Local disk cache at /data (volume-mounted) acts as the hot tier.
  #   - S3 backing against canonical MinIO bucket `qontinui-bazel-remote`
  #     is the durable cold tier: blobs survive container restart even
  #     after the local volume is wiped.
  #
  # Image: `muxinc/bazel-remote:latest` (mirror of buchgr/bazel-remote;
  # `buchgr/bazel-remote` was pulled from Docker Hub per Phase-0 spike
  # findings). Same image the spike at `tmp_spike_bazel_remote/`
  # verified end-to-end.
  #
  # AC validation: ON (Row 10 Item 7, 2026-05-15). The supervisor build
  # pool now writes real REAPI `ActionResult` protobufs
  # (qontinui-supervisor src/reapi.rs), so bazel-remote validates every
  # HTTP AC PUT — body must parse as `build.bazel.remote.execution.v2
  # .ActionResult` and every referenced digest must already be in CAS.
  # The `--disable_http_ac_validation` flag was removed once the
  # supervisor synthetic round-trip (tests/row10_cache_synthetic.rs)
  # proved the protobuf passes validation. Do NOT re-add the flag: any
  # legacy JSON-pointer AC body (Items 5-6 interim, never shipped — 5-7
  # landed together) would now be rejected, which is the intended
  # behavior.
  # ───────────────────────────────────────────────────────────────────────
  bazel-remote:
    image: muxinc/bazel-remote:latest
    container_name: qontinui-canonical-bazel-remote
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Image entrypoint hardcodes `./bazel-remote --port=80 --dir=/data`;
    # `command` flags below append. --max_size is required by the binary
    # so cache size is bounded. S3 flags route to canonical MinIO over
    # plain HTTP (--s3.disable_ssl) since the in-stack bridge is local.
    command:
      - --max_size=${BAZEL_REMOTE_MAX_SIZE_GIB:-50}
      - --grpc_port=9092
      - --s3.endpoint=${BAZEL_REMOTE_S3_ENDPOINT:-minio:9000}
      - --s3.bucket=${BAZEL_REMOTE_BUCKET:-qontinui-bazel-remote}
      - --s3.access_key_id=${MINIO_ROOT_USER:-minioadmin}
      - --s3.secret_access_key=${MINIO_ROOT_PASSWORD:-minioadmin}
      - --s3.disable_ssl
    ports:
      - "${BAZEL_REMOTE_HTTP_PORT:-9094}:80"
      - "${BAZEL_REMOTE_GRPC_PORT:-9095}:9092"
    volumes:
      - canonical_bazel_remote_data:/data
    healthcheck:
      # /status returns a JSON stats blob — exercises the HTTP server +
      # confirms the cache directory is initialised. wget ships in the
      # image (no curl); the binary listens on container-port 80.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:80/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────────────────────────────
  # NATS JetStream — durable, replayable event streams.
  #
  # Row 9 Phase 1 (per plans/2026-05-14-failure-modes-at-scale-design.md
  # §3.1): a 3-node cluster fronts every event channel that needs
  # at-least-once delivery semantics. Redis pub/sub stays in service
  # alongside; coord dual-publishes during the 2-week burn-in.
  #
  # Port choices: 4223 (client) and 8223 (monitor) on the host, mapped
  # to 4222 / 8222 inside the containers. Follows the same "+1 offset"
  # convention as postgres (5433→5432) and redis (6380→6379). Cluster
  # routes on 6222 are container-internal only — no host exposure.
  #
  # All three nodes share their JetStream store via per-node named
  # volumes; streams survive container restarts. mTLS is the
  # production target (design §3.1) but deferred to Phase 2 hardening;
  # Phase 1 uses shared-secret cluster auth + a client user/password
  # pair, same posture as redis `requirepass`.
  # ───────────────────────────────────────────────────────────────────────
  nats-1:
    image: nats:2.10-alpine
    container_name: qontinui-canonical-nats-1
    restart: unless-stopped
    command:
      - "--config=/etc/nats/nats-1.conf"
    environment:
      CLIENT_USER: ${NATS_CLIENT_USER:-qontinui_client}
      CLIENT_PASSWORD: ${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}
      CLUSTER_PASSWORD: ${NATS_CLUSTER_PASSWORD:-qontinui_dev_nats_cluster}
    ports:
      - "${NATS_CLIENT_PORT:-4223}:4222"
      - "${NATS_MONITOR_PORT:-8223}:8222"
    volumes:
      - ./nats-config/nats-1.conf:/etc/nats/nats-1.conf:ro
      - canonical_nats_1_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats-2:
    image: nats:2.10-alpine
    container_name: qontinui-canonical-nats-2
    restart: unless-stopped
    command:
      - "--config=/etc/nats/nats-2.conf"
    environment:
      CLIENT_USER: ${NATS_CLIENT_USER:-qontinui_client}
      CLIENT_PASSWORD: ${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}
      CLUSTER_PASSWORD: ${NATS_CLUSTER_PASSWORD:-qontinui_dev_nats_cluster}
    volumes:
      - ./nats-config/nats-2.conf:/etc/nats/nats-2.conf:ro
      - canonical_nats_2_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats-3:
    image: nats:2.10-alpine
    container_name: qontinui-canonical-nats-3
    restart: unless-stopped
    command:
      - "--config=/etc/nats/nats-3.conf"
    environment:
      CLIENT_USER: ${NATS_CLIENT_USER:-qontinui_client}
      CLIENT_PASSWORD: ${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}
      CLUSTER_PASSWORD: ${NATS_CLUSTER_PASSWORD:-qontinui_dev_nats_cluster}
    volumes:
      - ./nats-config/nats-3.conf:/etc/nats/nats-3.conf:ro
      - canonical_nats_3_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────
  # Jaeger all-in-one — OpenTelemetry trace backend (Row 9 Phase 5).
  #
  # Single-container deployment with the OTLP receiver (gRPC :4317, HTTP
  # :4318) and the Jaeger UI (:16686). All-in-one writes to in-memory
  # storage by default — fine for the v1 burn-in / dev box; production
  # observability stack (Tempo, Honeycomb, Datadog) is a Phase 6+ choice.
  #
  # Per Row 9 design §3.6: trace IDs propagate via traceparent over HTTP
  # and via NATS message headers; coord / supervisor / runner all export
  # to this collector. Sampling defaults are coded into the services
  # (1% baseline, 100% for tagged events).
  #
  # Ports:
  #   16686 → Jaeger UI (browse traces at http://localhost:16686)
  #   4317  → OTLP gRPC receiver (services point here via OTEL_EXPORTER_OTLP_ENDPOINT)
  #   4318  → OTLP HTTP receiver (services that prefer HTTP/JSON)
  #
  # When the host already binds 4317/4318 (running collector, dev tools),
  # override via env vars before `docker compose up`.
  # ───────────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: qontinui-canonical-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Cap the in-memory store so a runaway trace volume can't OOM the box.
      MEMORY_MAX_TRACES: "${JAEGER_MAX_TRACES:-50000}"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    healthcheck:
      # /api/services is the cheapest endpoint that proves the collector
      # is responsive — returns 200 with `{"data": null, ...}` when no
      # traces have arrived yet.
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:16686/api/services"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ───────────────────────────────────────────────────────────────────────
  # qontinui-coord — coordinator service.
  #
  # Built from ../qontinui-coord/Dockerfile. Terminates WebSockets,
  # ingests GitHub webhooks (HMAC-validated, republished on Redis), and
  # fronts the canonical PG + Redis. See ../qontinui-coord/README.md.
  #
  # In-stack DSNs use the service names (postgres, redis), not the
  # host-mapped ports. GITHUB_WEBHOOK_SECRET is intentionally unset by
  # default so the endpoint rejects all requests until the operator
  # configures the shared secret in .env.
  # ───────────────────────────────────────────────────────────────────────
  coord:
    build:
      context: ../qontinui-coord
      dockerfile: Dockerfile
    image: qontinui-canonical-coord:latest
    container_name: qontinui-canonical-coord
    restart: unless-stopped
    # `migrator: service_completed_successfully` makes a migrator
    # failure (multi-head divergence, broken DDL, transient PG hiccup)
    # block coord startup loudly, instead of letting coord come up
    # against an under-migrated DB and emit "column X does not exist"
    # 500s into runtime logs that nobody reads. Alembic upgrade is
    # idempotent (no-op when already at head), so the gate is cheap on
    # the happy path and load-bearing on the failure path.
    # Background: 2026-05-07 multi-head divergence
    # (cr01a2b3c4d5 + 7c5e4d3b2a1f) had the migrator exit 255 four
    # hours before anyone noticed, because nothing depended on its
    # success. See investigation in
    # qontinui-web@5d320ffb / qontinui-runner@1d984230f.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      # NATS gate is best-effort: coord retries the JetStream connection
      # in-process. Gating on `service_healthy` is still preferred so
      # the first PUBLISH after coord boot doesn't race a cold cluster.
      nats-1:
        condition: service_healthy
      nats-2:
        condition: service_healthy
      nats-3:
        condition: service_healthy
      # Jaeger gate is best-effort like NATS: coord retries OTLP exports
      # internally. Gating on `service_healthy` is preferred so the first
      # exported span after coord boot doesn't race a cold collector.
      jaeger:
        condition: service_healthy
    ports:
      - "${COORD_PORT:-9870}:9870"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-qontinui_user}:${POSTGRES_PASSWORD:-qontinui_dev_password}@postgres:5432/${POSTGRES_DB:-qontinui_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-qontinui_dev_redis}@redis:6379/0
      # Multi-server URL — async-nats parses the comma-separated list
      # and uses any responsive node as the entry point; the cluster
      # mesh handles internal routing.
      NATS_URL: nats://${NATS_CLIENT_USER:-qontinui_client}:${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}@nats-1:4222,nats://${NATS_CLIENT_USER:-qontinui_client}:${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}@nats-2:4222,nats://${NATS_CLIENT_USER:-qontinui_client}:${NATS_CLIENT_PASSWORD:-qontinui_dev_nats}@nats-3:4222
      COORD_BIND_ADDR: 0.0.0.0:9870
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Phase 5B.5 — sibling-repo clones land here. Persistent volume so
      # clones survive container restarts; otherwise every up cycle would
      # re-clone every tracked repo from scratch.
      COORD_MIRRORS_ROOT: /var/lib/qontinui-coord/mirrors
      # GITHUB_TOKEN is optional; required only for cloning private
      # qontinui-web. When unset, public-repo enrichment still works.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Row 2 Phase 2 — sccache stats scrape target. Coord aggregates
      # bucket-side counters (object count, total size) from this URL on
      # its /metrics endpoint. Unset disables sccache stats reporting
      # (the rest of /metrics keeps working).
      SCCACHE_STATS_URL: ${SCCACHE_STATS_URL:-http://sccache:4227}
      RUST_LOG: ${COORD_RUST_LOG:-qontinui_coord=info,axum=info,tower_http=info}
      # Row 9 Phase 5 — OpenTelemetry export. Unset disables tracing; the
      # coord process logs at startup and continues without OTel. The
      # baseline sample rate is 1% (per design §3.6); the
      # `TaggedSampler` promotes tagged spans (auth-failure,
      # partition-event, cache-miss-cold, merge-conflict) to 100%
      # regardless of the baseline rate.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_SERVICE_NAME: ${COORD_OTEL_SERVICE_NAME:-qontinui-coord}
      OTEL_TRACES_SAMPLER_ARG: ${COORD_OTEL_SAMPLE_RATE:-0.01}
    volumes:
      - canonical_coord_mirrors:/var/lib/qontinui-coord/mirrors

# ───────────────────────────────────────────────────────────────────────────
# Volumes — explicit names so `docker compose down` doesn't take them out;
# only `docker compose down -v` wipes data. Matches qontinui-web's
# convention.
# ───────────────────────────────────────────────────────────────────────────
volumes:
  canonical_postgres_data:
    name: qontinui_canonical_postgres_data
  canonical_redis_data:
    name: qontinui_canonical_redis_data
  canonical_coord_mirrors:
    name: qontinui_canonical_coord_mirrors
  canonical_minio_data:
    name: qontinui_canonical_minio_data
  canonical_bazel_remote_data:
    name: qontinui_canonical_bazel_remote_data
  canonical_nats_1_data:
    name: qontinui_canonical_nats_1_data
  canonical_nats_2_data:
    name: qontinui_canonical_nats_2_data
  canonical_nats_3_data:
    name: qontinui_canonical_nats_3_data

# Default network (`qontinui-stack_default`) is created automatically and
# isolates this stack from the legacy qontinui-web stack. Connections from
# the host (or LAN) target the published ports; in-stack services
# (migrator → postgres) use service names.
